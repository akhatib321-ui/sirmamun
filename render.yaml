services:
  - type: web
    name: sirmamun-api
    runtime: node
    buildCommand: NODE_OPTIONS=--max-old-space-size=460 npm install && (npx prisma migrate resolve --applied "0_init" || true) && npx prisma migrate deploy && npm run build
    startCommand: node apps/api/dist/main.js
    envVars:
      - key: PORT
        value: 10000
      - key: NODE_ENV
        value: production
      - key: DB_HOST
        fromDatabase:
          name: sirmamun-db
          property: host
      - key: DB_PORT
        fromDatabase:
          name: sirmamun-db
          property: port
      - key: DB_USER
        fromDatabase:
          name: sirmamun-db
          property: user
      - key: DB_PASS
        fromDatabase:
          name: sirmamun-db
          property: password
      - key: DB_NAME
        fromDatabase:
          name: sirmamun-db
          property: database
      - key: DB_SSL
        value: "true"
      - key: DATABASE_URL
        fromDatabase:
          name: sirmamun-db
          property: connectionString
      - key: REDIS_URL
        fromService:
          type: redis
          name: sirmamun-redis
          property: connectionString

databases:
  - name: sirmamun-db
    databaseName: sirmamun
    plan: free

services:
  - type: redis
    name: sirmamun-redis
    plan: free
    maxmemoryPolicy: noeviction
